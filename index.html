<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: transparent; display: flex; justify-content: center; align-items: flex-end; height: 100vh; overflow: hidden; }
        .container { position: relative; height: 95vh; }
        img { display: none; height: 100%; width: auto; object-fit: contain; }
        #oc { display: block; } /* 初期状態は目開・口閉 */
    </style>
</head>
<body>
    <div class="container">
        <img src="01.png" id="oo"> <img src="02.png" id="oc"> <img src="03.png" id="co"> <img src="04.png" id="cc"> </div>

    <script>
        const imgs = {
            oo: document.getElementById('oo'),
            oc: document.getElementById('oc'),
            co: document.getElementById('co'),
            cc: document.getElementById('cc')
        };
        
        let isDetected = false; // 音を検知しているか
        let isTalking = false;  // パクパクのアニメーション状態
        let isBlinking = false; // 瞬き状態

        // 画像表示更新
        function update() {
            for (let k in imgs) imgs[k].style.display = 'none';
            if (isBlinking) {
                (isDetected && isTalking) ? imgs.co.style.display = 'block' : imgs.cc.style.display = 'block';
            } else {
                (isDetected && isTalking) ? imgs.oo.style.display = 'block' : imgs.oc.style.display = 'block';
            }
        }

        // --- 0.5秒おきの口パクタイマー ---
        setInterval(() => {
            if (isDetected) {
                isTalking = !isTalking;
                update();
            } else {
                if (isTalking) {
                    isTalking = false;
                    update();
                }
            }
        }, 500);

        // --- 瞬き（15秒周期） ---
        function runBlink() {
            isBlinking = true; update();
            setTimeout(() => {
                isBlinking = false; update();
                if (Math.random() < 0.3) {
                    setTimeout(() => {
                        isBlinking = true; update();
                        setTimeout(() => { isBlinking = false; update(); }, 150);
                    }, 200);
                }
            }, 150);
            setTimeout(runBlink, 15000);
        }
        runBlink();

        // --- 音声解析 ---
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const ana = ctx.createAnalyser();
                ctx.createMediaStreamSource(stream).connect(ana);
                ana.fftSize = 256;
                const data = new Uint8Array(ana.frequencyBinCount);

                function check() {
                    ana.getByteFrequencyData(data);
                    let vol = data.reduce((a, b) => a + b) / data.length;
                    isDetected = vol > 10; // 感度調整。必要ならこの数字をいじってください
                    requestAnimationFrame(check);
                }
                check();
            } catch (e) {
                // 自動起動失敗時はクリック待機
                window.onclick = () => { initAudio(); window.onclick = null; };
            }
        }

        // 読み込み時に実行
        initAudio();
    </script>
</body>
</html>
