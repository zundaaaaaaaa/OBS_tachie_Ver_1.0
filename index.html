<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: transparent; display: flex; justify-content: center; align-items: flex-end; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .container { position: relative; height: 90vh; }
        img { display: none; height: 100%; width: auto; }
        img.active { display: block; }
        /* デバッグ用数値表示 */
        #debug { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px; font-size: 20px; z-index: 100; }
    </style>
</head>
<body>
    <div id="debug">クリックして開始 (Vol: 0)</div>
    <div class="container">
        <img src="01.png" id="oo" class="active">
        <img src="02.png" id="oc">
        <img src="03.png" id="co">
        <img src="04.png" id="cc">
    </div>

    <script>
        const el = { oo, oc, co, cc }, dbg = document.getElementById('debug');
        let isT = false, isB = false;

        const update = () => {
            for (let k in el) el[k].style.display = 'none';
            let s = isB ? (isT ? 'co' : 'cc') : (isT ? 'oo' : 'oc');
            el[s].style.display = 'block';
        };

        const blink = () => {
            isB = true; update();
            setTimeout(() => { isB = false; update(); }, 150);
            setTimeout(blink, 15000);
        };
        blink();

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const ctx = new AudioContext();
                const src = ctx.createMediaStreamSource(stream);
                const ana = ctx.createAnalyser();
                ana.fftSize = 256;
                src.connect(ana);
                const d = new Uint8Array(ana.frequencyBinCount);

                const loop = () => {
                    ana.getByteFrequencyData(d);
                    const vol = d.reduce((a, b) => a + b) / d.length;
                    
                    // 数値を画面に表示
                    dbg.innerText = "Vol: " + Math.floor(vol);

                    // ここで反応する数値を調整（5以下にするとノイズで開きっぱなしになるかも）
                    const nowT = vol > 5; 
                    if (nowT !== isT) { isT = nowT; update(); }
                    requestAnimationFrame(loop);
                };
                loop();
                dbg.style.color = "#0f0"; // 成功したら緑に
            } catch (e) {
                dbg.innerText = "エラー: " + e.message;
                dbg.style.color = "red";
            }
        }

        window.onclick = () => { init(); window.onclick = null; };
    </script>
</body>
</html>
